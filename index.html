<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento InfinitePay</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Finalizar pagamento</h1>
      <p class="subtitle">Preencha os dados do cliente para gerar o link da InfinitePay.</p>

      <form id="customer-form" novalidate>
        <label for="name">Nome</label>
        <input id="name" name="name" type="text" placeholder="Ex.: Wanderson" required />

        <label for="email">E-mail</label>
        <input id="email" name="email" type="email" placeholder="Ex.: teste@teste.com" required />

        <label for="phone">Telefone</label>
        <input id="phone" name="phone" type="tel" placeholder="Ex.: +5511914600243" required />
      </form>

      <div id="status" class="status">Digite os dados para gerar o link.</div>

      <button id="pay-btn" class="pay-btn" disabled>Pagar agora</button>

      <a id="checkout-link" class="checkout-link" href="#" target="_blank" rel="noreferrer noopener" hidden>
        Abrir link de pagamento em nova aba
      </a>

      <details class="payload-box">
        <summary>Ver payload enviado</summary>
        <pre id="payload-preview"></pre>
      </details>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
